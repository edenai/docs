name: Generate AI Feature Docs

on:
  schedule:
    # Daily at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate feature documentation
        run: python scripts/generate_features.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: update auto-generated AI feature pages"
          branch: auto/update-feature-docs
          title: "docs: update AI feature documentation"
          body: |
            Automated update of AI feature documentation pages from the
            production `/v3/info` API.

            This PR was generated by the `generate-features` workflow.
          labels: documentation, automated
          delete-branch: true
