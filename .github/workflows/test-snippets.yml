name: Test Documentation Snippets

on:
  pull_request:
    paths:
      - 'v3/**/*.mdx'
      - '*.mdx'
      - 'tests/**'

jobs:
  execute:
    name: Execution Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install -r tests/requirements-lock.txt --system
      - run: pytest tests/test_snippets_execute.py --cov-report=xml:coverage.xml
        env:
          EDEN_AI_SANDBOX_API_TOKEN: ${{ secrets.EDEN_AI_SANDBOX_TOKEN }}
          EDEN_AI_PRODUCTION_API_TOKEN: ${{ secrets.EDEN_AI_PRODUCTION_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
